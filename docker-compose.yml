services:
  switch:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: jpos-q2-switch:latest
    container_name: jpos-q2-switch
    environment:
      BASE_DERIVATION_KEY: 0123456789ABCDEFFEDCBA9876543210
      JAVA_OPTS: -Dswitch.listener.debug=true
      DB_HOST: jpos-postgresql
      DB_PORT: "5432"
      DB_NAME: jpos
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_URL: jdbc:postgresql://jpos-postgresql:5432/jpos
    ports:
      - "9000:9000"
    volumes:
      - ./cfg:/app/cfg:ro
      - ./deploy:/app/deploy:ro
      - ~/.m2:/root/.m2
    restart: unless-stopped
    depends_on:
      - jpos-postgresql
    networks:
      - jpos-net
  jpos-postgresql:
    image: postgres:18
    container_name: jpos-postgresql
    ports:
      - "5432:5432" # PostgreSQL default port
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "jpos"
    volumes:
      - postgres-data:/var/lib/postgresql # Postgres 18+ recommended mountpoint
    networks:
      - jpos-net
    restart: unless-stopped

  jpos-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jpos-backend
    depends_on:
      jpos-postgresql:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      # Override localhost with Docker service names for container networking
      POSTGRES_HOST: jpos-postgresql
    ports:
      - "8000:8000"
    networks:
      - jpos-net
  
  jpos-frontend:
    image: node:18-alpine
    container_name: jpos-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      jpos-backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    networks:
      - jpos-net

volumes:
  postgres-data:

networks:
  jpos-net:
    driver: bridge