services:
  switch:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: jpos-q2-switch:latest
    container_name: jpos-q2-switch
    environment:
      BASE_DERIVATION_KEY: 0123456789ABCDEFFEDCBA9876543210
      JAVA_OPTS: -Dswitch.listener.debug=true
      DB_HOST: jpos-postgresql
      DB_PORT: "5432"
      DB_NAME: jpos
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_URL: jdbc:postgresql://jpos-postgresql:5432/jpos
    ports:
      - "9000:9000"
    volumes:
      - ./cfg:/app/cfg:ro
      - ./deploy:/app/deploy:ro
      - ~/.m2:/root/.m2
    restart: unless-stopped
    depends_on:
      - jpos-postgresql
    networks:
      - jpos-net
  jpos-postgresql:
    image: postgres:18
    container_name: jpos-postgresql
    ports:
      - "5432:5432" # PostgreSQL default port
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "jpos"
    volumes:
      - postgres-data:/var/lib/postgresql # Postgres 18+ recommended mountpoint
    networks:
      - jpos-net
    restart: unless-stopped


volumes:
  postgres-data:

networks:
  jpos-net:
    driver: bridge